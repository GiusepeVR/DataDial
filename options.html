<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormDial — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:      #080c14;
      --surface: #0f1825;
      --border:  rgba(148,163,184,0.12);
      --accent:  #6EE7B7;
      --accent2: #93C5FD;
      --text:    #e2e8f0;
      --muted:   #64748b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px;
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(110,231,183,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, rgba(147,197,253,0.05) 0%, transparent 50%);
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      border: 1.5px solid rgba(110,231,183,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(110,231,183,0.2);
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      font-family: 'JetBrains Mono', monospace;
    }

    .profiles-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: #fff;
      border-color: var(--accent);
      background: rgba(110,231,183,0.1);
      box-shadow: 0 0 12px rgba(110,231,183,0.15);
    }
    .tab-btn:hover:not(.active) {
      border-color: rgba(148,163,184,0.3);
      color: var(--text);
    }

    .add-profile-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-profile-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .delete-profile-btn {
      margin-left: auto;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid rgba(248, 113, 113, 0.3);
      background: transparent;
      color: #f87171;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .delete-profile-btn:hover {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(248, 113, 113, 0.6);
    }

    .profile-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .profile-label-input {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      color: var(--text);
      padding: 4px 0;
      outline: none;
      width: 140px;
      transition: border-color 0.15s;
    }
    .profile-label-input:focus {
      border-color: var(--accent);
    }

    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      border-color: var(--accent);
      background: rgba(110,231,183,0.05);
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    .save-btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #34d399);
      color: #0a1628;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .save-btn:hover { opacity: 0.88; }
    .save-btn:active { transform: scale(0.97); }

    .status {
      font-size: 12px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status.visible { opacity: 1; }

    .tip {
      margin-top: 24px;
      padding: 14px 18px;
      background: rgba(110,231,183,0.05);
      border: 1px solid rgba(110,231,183,0.15);
      border-radius: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      font-family: 'JetBrains Mono', monospace;
    }
    .tip strong { color: var(--accent); }

    .auth-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .auth-section .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .auth-section .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(110,231,183,0.15);
      border: 1px solid var(--border);
    }

    .auth-section .user-email {
      font-size: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    .auth-section .sync-status {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .google-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .google-btn:hover {
      border-color: rgba(148,163,184,0.3);
      background: rgba(255,255,255,0.1);
    }

    .sign-out-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sign-out-btn:hover {
      border-color: rgba(248,113,113,0.4);
      color: #f87171;
    }

    .sync-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(110,231,183,0.25);
      background: transparent;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sync-btn:hover {
      background: rgba(110,231,183,0.08);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">⚡</div>
    <div>
      <h1>Form<span>Dial</span></h1>
      <div class="subtitle">autofill profiles</div>
    </div>
  </header>

  <div class="auth-section" id="authSection">
    <button class="google-btn" id="googleSignInBtn">Sign in with Google</button>
    <span class="sync-status">Sync profiles across devices</span>
  </div>

  <div class="profiles-tabs" id="profileTabs"></div>

  <div class="profile-panel" id="profilePanel"></div>

  <div class="actions">
    <button class="save-btn" id="saveBtn">Save Changes</button>
    <span class="status" id="status">✓ Saved!</span>
  </div>

  <div class="tip">
    <strong>How to use:</strong> Focus any text field then press <strong>&#8984;&#241;</strong> (or Ctrl+&#241; on Windows) to open the dial, or click the <strong>&#9889;</strong> icon that appears inside the field. Click a petal to fill instantly. Press <strong>Esc</strong> to dismiss.
  </div>

  <script src="firebase-rest.js"></script>
  <script src="storage-layer.js"></script>
  <script src="options.js"></script>
</body>
</html>
