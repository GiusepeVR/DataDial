<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

    body {
      width: 230px;
      padding: 18px;
      background: #0a1628;
      color: #e2e8f0;
      font-family: 'Syne', sans-serif;
      margin: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      border: 1.5px solid rgba(110, 231, 183, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(110, 231, 183, 0.15);
    }

    h2 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0;
    }

    h2 span { color: #6EE7B7; }

    .subtitle {
      font-size: 10px;
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .desc {
      font-size: 11px;
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .desc strong { color: #6EE7B7; }

    .active-profile-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(110, 231, 183, 0.06);
      border: 1px solid rgba(110, 231, 183, 0.15);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .profile-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .profile-name {
      font-size: 11px;
      font-weight: 700;
      color: #e2e8f0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-label {
      font-size: 9px;
      color: #64748b;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
    }

    .open-settings {
      display: block;
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1.5px solid rgba(110, 231, 183, 0.3);
      background: rgba(110, 231, 183, 0.08);
      color: #6EE7B7;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      outline: none;
    }

    .open-settings:hover {
      background: rgba(110, 231, 183, 0.14);
      border-color: rgba(110, 231, 183, 0.6);
    }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(110, 231, 183, 0.06);
      margin-bottom: 12px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #64748b;
    }

    .sync-indicator.signed-in { color: #6EE7B7; }

    .sync-indicator .cloud-icon { font-size: 12px; }
  </style>
</head>
<body>
  <div class="logo-row">
    <div class="logo">&#9889;</div>
    <div>
      <h2>Data<span>Dial</span></h2>
      <div class="subtitle">quick-fill profiles</div>
    </div>
  </div>

  <p class="desc">
    Focus any text field, then press <strong>&#8984;&#241;</strong> to open the dial and fill instantly.
  </p>

  <div class="active-profile-row">
    <div class="profile-dot" id="profileDot" style="background: #6EE7B7"></div>
    <span class="profile-name" id="profileName">Loading&hellip;</span>
    <span class="profile-label">active</span>
  </div>

  <div class="sync-indicator" id="syncIndicator"></div>

  <button class="open-settings" id="openSettings">&#9881; Edit Profiles</button>

  <script src="popup.js"></script>
</body>
</html>
